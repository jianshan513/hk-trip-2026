{icon:"🚇",title:"交通必備",text:"買一張八達通卡（HK$150含HK$50按金），港鐵、巴士、電車、便利商店、超市都能用"},
{icon:"📦",title:"市區預辦登機",text:"最後一天在九龍站或香港站辦理，國泰航空起飛前90分鐘至24小時可辦。需持電子護照＋機場快線車票/八達通"},
{icon:"📱",title:"迪士尼App",text:"提前下載香港迪士尼官方App，可查看排隊時間、角色出沒時間、領取預約等候卡"},
{icon:"💰",title:"匯率提醒",text:"港幣兌台幣約1:4.1，建議信用卡海外刷卡（注意手續費），或到市區找換店換港幣"},
{icon:"🔌",title:"電壓插座",text:"香港使用英式三腳插座（Type G），電壓220V，記得帶轉接頭"},
{icon:"🌦️",title:"三月天氣",text:"三月底氣溫約20-25°C，偶有毛毛雨，建議帶薄外套和雨具"}
];

const TS={
transport:{bg:"rgba(158,158,158,0.15)",text:"#B0BEC5",border:"#78909C",label:"交通"},
hotel:{bg:"rgba(255,183,77,0.12)",text:"#FFB74D",border:"#FFA726",label:"住宿"},
food:{bg:"rgba(255,77,77,0.12)",text:"#FF8A80",border:"#FF5252",label:"美食"},
activity:{bg:"rgba(77,208,225,0.12)",text:"#80DEEA",border:"#4DD0E1",label:"活動"},
highlight:{bg:"rgba(255,215,64,0.12)",text:"#FFD740",border:"#FFC400",label:"必訪"}
};

let activeDay=0;

function render(){
  // Tabs
  const tabs=document.getElementById('dayTabs');
  tabs.innerHTML=DAYS.map((d,i)=>`
    <button class="day-tab${i===activeDay?' active':''}" onclick="switchDay(${i})"
      style="${i===activeDay?`border-color:${d.color};background:linear-gradient(180deg,${d.color}18,${d.color}08)`:''}">
      <div class="bar" style="background:${d.color}"></div>
      <div class="ico">${d.icon}</div>
      <div class="label">DAY ${i+1}</div>
      <div class="sub">${d.date}</div>
    </button>
  `).join('');

  const day=DAYS[activeDay];

  // Header
  const hdr=document.getElementById('dayHeader');
  hdr.style.borderLeftColor=day.color;
  hdr.style.background=`linear-gradient(135deg,${day.color}12,transparent)`;
  hdr.style.color=day.color;
  hdr.textContent=day.title;

  // Timeline
  const tl=document.getElementById('timeline');
  tl.innerHTML=day.items.map((item,idx)=>{
    const s=TS[item.type]||TS.activity;
    const rests=item.restaurants?item.restaurants.map(r=>`
      <div class="rest-card${r.sjb?' sjb':''}">
        <div class="rest-head">
          <span class="rest-name">${r.name}</span>
          <span class="rest-tag${r.sjb?' sjb':''}">${r.tag}</span>
        </div>
        <div class="rest-note">${r.note}</div>
      </div>
    `).join(''):'';
    return `
    <div class="tl-row">
      <div class="tl-left">
        <div class="tl-time">${item.time}</div>
        <div class="tl-dot" style="background:${s.bg};border:1.5px solid ${s.border}40">${item.icon}</div>
        ${idx<day.items.length-1?`<div class="tl-line" style="background:linear-gradient(180deg,${day.color}30,transparent)"></div>`:''}
      </div>
      <div class="tl-card" onclick="toggleCard(this)">
        <div class="tl-card-head">
          <div>
            <span class="tl-badge" style="background:${s.bg};color:${s.text};border:1px solid ${s.border}30">${s.label}</span>
            <h3>${item.title}</h3>
          </div>
          <span class="tl-arrow">▼</span>
        </div>
        <div class="tl-body">
          <p class="tl-desc">${item.desc}</p>
          ${rests?`<div class="rest-list">${rests}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function switchDay(i){ activeDay=i; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function toggleCard(el){
  const body=el.querySelector('.tl-body');
  const arrow=el.querySelector('.tl-arrow');
  if(body.classList.contains('hidden')){
    body.classList.remove('hidden');
    arrow.classList.remove('up');
  } else {
    body.classList.add('hidden');
    arrow.classList.add('up');
  }
}

// Tips
document.getElementById('tipsGrid').innerHTML=TIPS.map(t=>`
  <div class="tip-card">
    <div class="ico">${t.icon}</div>
    <div class="t">${t.title}</div>
    <div class="d">${t.text}</div>
  </div>
`).join('');

render();
</script>
