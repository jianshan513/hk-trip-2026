{"i":"🧳","t":"行李限額","d":"國泰經濟艙：託運23kg/件、手提7kg。去程行李箱留空間，回程蛋撻伴手禮會爆買！"}
];

var TS={"transport":{"bg":"rgba(158,158,158,0.15)","tx":"#B0BEC5","bd":"#78909C","lb":"交通"},"hotel":{"bg":"rgba(255,183,77,0.12)","tx":"#FFB74D","bd":"#FFA726","lb":"住宿"},"food":{"bg":"rgba(255,77,77,0.12)","tx":"#FF8A80","bd":"#FF5252","lb":"美食"},"activity":{"bg":"rgba(77,208,225,0.12)","tx":"#80DEEA","bd":"#4DD0E1","lb":"活動"},"highlight":{"bg":"rgba(255,215,64,0.12)","tx":"#FFD740","bd":"#FFC400","lb":"必訪"}};
var cur=0;
var curRoute="A";

function esc(s){var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML;}

function drawPageTabs(){
var h="";
for(var i=0;i<PAGES.length;i++){
h+='<button class="page-tab'+(i===curPage?' on':'')+'" onclick="goPage('+i+')">'+PAGES[i]+'</button>';
}
document.getElementById("ptabs").innerHTML=h;
}

function goPage(i){
curPage=i;
drawPageTabs();
for(var j=0;j<PAGE_IDS.length;j++){
document.getElementById(PAGE_IDS[j]).className="page-content"+(j===i?" on":"");
}
}

function draw(){
var i,h,day=DAYS[cur],s,item,r,j;
h="";
for(i=0;i<DAYS.length;i++){var d=DAYS[i],a=i===cur;h+='<button class="tab'+(a?' on':'')+'" onclick="go('+i+')" style="'+(a?'border-color:'+d.color+';background:linear-gradient(180deg,'+d.color+'18,'+d.color+'08);':'')+'"><div class="bar" style="background:'+d.color+'"></div><div class="ic">'+d.icon+'</div><div class="lb">DAY '+(i+1)+'</div><div class="sb">'+d.date+'</div></button>';}
document.getElementById("tabs").innerHTML=h;

var hdr=document.getElementById("dhdr");
hdr.style.borderLeftColor=day.color;hdr.style.background="linear-gradient(135deg,"+day.color+"12,transparent)";hdr.style.color=day.color;hdr.innerHTML=esc(day.title);

var rta=document.getElementById("route-toggle-area");
if(day.hasRoutes){
rta.innerHTML='<div class="route-toggle"><button class="route-btn'+(curRoute==="A"?" on":"")+'" onclick="setRoute(\'A\')">方案A：九龍掃街</button><button class="route-btn'+(curRoute==="B"?" on":"")+'" onclick="setRoute(\'B\')">方案B：東涌Outlet</button></div>';
}else{
rta.innerHTML="";
}

var items=day.hasRoutes?(curRoute==="A"?DAY4_A:DAY4_B):day.items;

h="";
for(i=0;i<items.length;i++){
item=items[i];s=TS[item.type]||TS.activity;
var rests="";
if(item.transit){
rests+='<div class="transit">'+esc(item.transit)+'</div>';
}
if(item.rr){for(j=0;j<item.rr.length;j++){r=item.rr[j];var cls=r.s?"sj":(r.k==="tk"?"tk":(r.k==="lo"?"lo":""));rests+='<div class="rc'+(cls?' '+cls:'')+'"><div class="rh"><span class="rn">'+esc(r.n)+'</span><span class="rt'+(cls?' '+cls:'')+'">'+esc(r.t)+'</span></div><div class="rno">'+esc(r.d)+'</div></div>';}}

var foodNote="";
if(item.type==="food"){foodNote='<span class="opt-badge">隨意選吃</span>';}

h+='<div class="row"><div class="lt"><div class="tm">'+item.time+'</div><div class="dt" style="background:'+s.bg+';border:1.5px solid '+s.bd+'40">'+item.icon+'</div>'+(i<items.length-1?'<div class="ln" style="background:linear-gradient(180deg,'+day.color+'30,transparent)"></div>':'')+'</div><div class="cd" onclick="tog(this)"><div class="cd-h"><div><span class="bg" style="background:'+s.bg+';color:'+s.tx+';border:1px solid '+s.bd+'30">'+s.lb+'</span>'+foodNote+'<h3>'+esc(item.title)+'</h3></div><span class="ar">▼</span></div><div class="bd"><p class="ds">'+esc(item.desc)+'</p>'+(rests?'<div class="rl">'+rests+'</div>':'')+'</div></div></div>';
}
document.getElementById("tl").innerHTML=h;
}

function go(i){cur=i;draw();window.scrollTo(0,0);}
function setRoute(r){curRoute=r;draw();}
function tog(el){var bd=el.getElementsByClassName("bd")[0];var ar=el.getElementsByClassName("ar")[0];if(bd.className.indexOf("hd")>=0){bd.className="bd";ar.className="ar";}else{bd.className="bd hd";ar.className="ar up";}}

function drawFoodMap(){
var h="";
for(var i=0;i<FOOD_MAP.length;i++){
var fm=FOOD_MAP[i];
h+='<div class="fm-region"><div class="fm-region-h" style="color:'+fm.color+'">'+esc(fm.region)+'</div>';
for(var j=0;j<fm.items.length;j++){
var it=fm.items[j];
h+='<div class="fm-item'+(it.lo?' lo':'')+'"><div class="fm-name">'+(it.lo?'🟣 ':'')+esc(it.n)+'</div><div class="fm-desc">'+esc(it.d)+'</div>';
if(it.br){h+='<div class="fm-branch">'+esc(it.br)+'</div>';}
h+='</div>';
}
h+='</div>';
}
document.getElementById("foodmap").innerHTML=h;
}

function drawGuide(){
var h="";
for(var i=0;i<GUIDE.length;i++){
var g=GUIDE[i];
h+='<div class="sg-item"><div class="sg-title">'+esc(g.t)+'</div><div class="sg-desc">'+esc(g.d)+'</div></div>';
}
document.getElementById("guide").innerHTML=h;
}

var tg="",tp;
for(var k=0;k<TIPS.length;k++){tp=TIPS[k];tg+='<div class="tc"><div class="i">'+tp.i+'</div><div class="tt">'+esc(tp.t)+'</div><div class="td">'+esc(tp.d)+'</div></div>';}
document.getElementById("tg").innerHTML=tg;

drawPageTabs();
draw();
drawFoodMap();
drawGuide();
</script>
</body>
</html>
